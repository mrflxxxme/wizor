# WIZOR dev-стек (PRD §12). Поднимается `make up` / `make dev-bootstrap`.
# Все секреты — из infra/.env (не коммитится; см. .env.example). Регион ПД — РФ.
name: wizor-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wizor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wizor}
      POSTGRES_DB: ${POSTGRES_DB:-wizor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wizor} -d ${POSTGRES_DB:-wizor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      # KC 26 отдаёт health на management-порту 9000.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
    environment:
      WIZOR_DATA_REGION: ru-central1
      WIZOR_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wizor}:${POSTGRES_PASSWORD:-wizor}@postgres:5432/${POSTGRES_DB:-wizor}
      WIZOR_REDIS_URL: redis://redis:6379/0
      WIZOR_CELERY_BROKER_URL: redis://redis:6379/1
      WIZOR_CELERY_RESULT_BACKEND: redis://redis:6379/2
      WIZOR_KEYCLOAK_URL: http://keycloak:8080
      WIZOR_POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      WIZOR_POSTHOG_HOST: ${POSTHOG_HOST:-http://localhost:8000}
    command: >
      sh -c "alembic upgrade head &&
             python -m wizor.iam.seed &&
             uvicorn wizor.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ../backend
    environment:
      WIZOR_DATA_REGION: ru-central1
      WIZOR_CELERY_BROKER_URL: redis://redis:6379/1
      WIZOR_CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: ["celery", "-A", "wizor.worker.celery_app", "worker", "--loglevel=info", "-Q", "default"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A wizor.worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ../frontend
      target: dev
    environment:
      NEXT_PUBLIC_POSTHOG_KEY: ${POSTHOG_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${POSTHOG_HOST:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
