name: frontend

on:
  push:
    branches: ["**"]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: Type-check (tsc)
        run: npm run typecheck
      - name: Vitest (+coverage ≥70%)
        run: npm test
      - name: Build (Next.js)
        run: npm run build
      - name: npm audit (block high+critical)
        run: npm audit --audit-level=high
